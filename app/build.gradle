   apply plugin: 'com.android.application'
   
   android {
       compileSdkVersion 25
       buildToolsVersion "25.0.0"
       defaultConfig {
           applicationId "com.techno.gallery"
           minSdkVersion 4 // Android 1.6 API
           targetSdkVersion 26
           versionCode 1
           versionName "1.0 (First release)"
           testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
   }
    buildTypes {
        release {
            shrinkResources false // reduces apk size removing unused code
            minifyEnabled true // increases performance optimizing dex files
            proguardFiles getDefaultProguardFiles ('proguard-android-optimize.txt'), 'proguard-rules.pro'
           }
       }
   }